<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bgOverlay" aria-hidden="true"></div>

  <div class="player">
    <div class="player-main">
      <div class="cover"><img id="coverImg" src="images/walkingwithyou.jpg" alt="cover"></div>
      <div class="info">
        <div id="title" class="title">Walking with you</div>
        <div id="singer" class="singer">Novelbright</div>
      </div>

      <div class="controls">
        <input id="seekbar" class="seekbar" type="range" min="0" max="100" value="0" step="1">
        <div class="time-row"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>

        <div class="action-row" role="group" aria-label="player controls">
          <button id="prevBtn" class="action-btn" aria-label="前へ" title="前へ">⏮</button>
          <button id="playBtn" class="play-btn" aria-label="再生/一時停止" title="再生/一時停止">⏯</button>
          <button id="nextBtn" class="action-btn" aria-label="次へ" title="次へ">⏭</button>
        </div>

        <div class="small-controls">
          <button id="shuffleBtn" class="icon-btn" title="シャッフル" aria-pressed="false">🔀</button>
          <button id="repeatBtn" class="icon-btn" title="リピート" aria-pressed="false">🔁</button>
          <button id="favBtn" class="icon-btn" title="お気に入り" aria-pressed="false">♡</button>
          <button id="volToggle" class="icon-btn" title="ボリューム">🔊</button>

          <div class="volume-box" id="volumeBox" style="display:none">
            <button class="volume-down" title="音量下げ">−</button>
            <input id="volumeRange" class="volume-range" type="range" min="0" max="100" step="1" value="80">
            <button class="volume-up" title="音量上げ">＋</button>
          </div>
        </div>
      </div>

      <audio id="music" preload="metadata"></audio>
    </div>

    <div class="playlist-wrap">
      <div class="playlist-title">Playlist</div>
      <ul id="playlist" class="playlist" aria-label="playlist"></ul>
    </div>
  </div>

  <!-- Sortable for drag-to-reorder -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
